services:
  assistant:
    build: .
    container_name: kavana-assistant
    restart: unless-stopped
    volumes:
      - .:/app
      - assistant_data:/app/data
      - chroma_data:/app/chromadb
    environment:
      - TZ=Europe/Madrid
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CHROMA_DB_PATH=/app/chromadb
    env_file:
      - .env
    ports:
      - "8000:8000"
    network_mode: host

volumes:
  assistant_data:
  chroma_data:
